version: '3.9'

services:
  redis:
    image: redis:alpine
    container_name: messenger-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - messenger-net
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: messenger-app
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      WS_PORT: 8000
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change_me_in_production_please
      LOG_LEVEL: info
    ports:
      - "8080:8080"
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - messenger-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  messenger-net:
    driver: bridge
